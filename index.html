<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>cabinet.</title>
    <meta name="description" content="Your beauty shelf, shared. Discover, collect and share your favourite skincare, makeup and haircare." />
    <meta name="application-name" content="cabinet." />

    <!-- PWA -->
    <meta name="theme-color" content="#F7F3EE" />
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="cabinet." />

    <!-- Icons -->
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="cabinet." />
    <meta property="og:description" content="Your beauty shelf, shared." />
    <meta property="og:image"       content="/icons/icon-512.png" />
    <meta property="og:url"         content="https://the-cabinet.app" />

    <!-- Twitter -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="cabinet." />
    <meta name="twitter:description" content="Your beauty shelf, shared." />
    <meta name="twitter:image"       content="/icons/icon-512.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Jost:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: #F7F3EE;
        overscroll-behavior: none;
        padding-top: env(safe-area-inset-top);
      }
      #root { height: 100%; }
      button, a { -webkit-tap-highlight-color: transparent; }
      ::-webkit-scrollbar { display: none; }
      * { scrollbar-width: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js", { scope: "/" })
            .then(reg => console.log("[cabinet] SW registered"))
            .catch(err => console.warn("[cabinet] SW failed:", err));
        });
      }
    </script>
  </body>
</html>
